<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Certificados</title>

<style>

/* ---------- ESTILOS GENERALES ---------- */

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#2b7cff,#00c6ff);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* ---------- HEADER ---------- */

header{
background:#1a3d7c;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* ---------- BODY ---------- */

main{
flex:1;
padding:40px 20px;
text-align:center;
}

/* BUSCADOR */

.buscador{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
max-width:400px;
margin:auto;
}

input{
width:85%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:12px;
padding:12px 25px;
border:none;
background:#2b7cff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

/* BLOQUES DE CERTIFICADOS */

.certificados{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.cert-card{

background:white;
width:280px;
padding:20px;

border-radius:10px;

box-shadow:0 6px 20px rgba(0,0,0,0.2);

text-align:center;

}

.cert-card h3{
margin-top:0;
font-size:18px;
color:#333;
}

.descargar{

display:none;

margin-top:10px;

padding:10px 20px;

background:#28a745;

color:white;

text-decoration:none;

border-radius:6px;

}

.descargar:hover{
background:#1f8a37;
}

.estado{
margin-top:10px;
font-weight:bold;
}

/* MENSAJES */

.ok{
color:#28a745;
}

.error{
color:red;
}

/* ---------- FOOTER ---------- */

footer{

background:#1a3d7c;

color:white;

text-align:center;

padding:15px;

font-size:14px;

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

Portal de Verificación de Certificados

</header>

<!-- BODY -->

<main>

<div class="buscador">

<p>Ingrese su número de CI</p>

<input type="text" id="ci" placeholder="Ej: 7212809">

<br>

<button onclick="buscar()">Buscar Certificados</button>

</div>


<!-- BLOQUES DE CERTIFICADOS -->

<div class="certificados">

<!-- CERTIFICADO 1 -->

<div class="cert-card">

<h3>Análisis e Impacto del D.S.5503</h3>

<div id="estado1" class="estado"></div>

<a id="link1" class="descargar" target="_blank">
Descargar Certificado
</a>

</div>

<!-- CERTIFICADO 2 -->

<div class="cert-card">

<h3>El Verdadero Rol Sindical</h3>

<div id="estado2" class="estado"></div>

<a id="link2" class="descargar" target="_blank">
Descargar Certificado
</a>

</div>

<!-- CERTIFICADO 3 -->

<div class="cert-card">

<h3>Frente al D.S.5503</h3>

<div id="estado3" class="estado"></div>

<a id="link3" class="descargar" target="_blank">
Descargar Certificado
</a>

</div>

</div>

</main>


<!-- FOOTER -->

<footer>

Sistema de verificación de certificados © 2026

</footer>


<script>

/* BASES DE DATOS */

const certificados=[

{
url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQBwaV8MukiuNrmX2wh-JUBjmbimI1mgF7adnuMdWxajvQ2-jvvWYi9uKn_EyqZk3kFyYKam8yGq7V_/pub?gid=0&single=true&output=csv",
estado:"estado1",
link:"link1"
},

{
url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQhNPw-DqY-NEUmbfVz00JBcZnZIHifOaSFF-MQ_BDiT288bcGMXF6-gdj-5j0YPgzVceWil_Qhkk8z/pub?gid=832962079&single=true&output=csv",
estado:"estado2",
link:"link2"
},

{
url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSSJjexwsV7Qph7wLj_Y3gBEK4LU_Au7C8a_g2L4uV-GdoDDeff-iFYhG9gVzMhvLOJniaZBmGz7Cie/pub?gid=0&single=true&output=csv",
estado:"estado3",
link:"link3"
}

];


/* BUSCAR CERTIFICADOS */

async function buscar(){

let ci=document.getElementById("ci").value.trim();

if(ci===""){
alert("Ingrese su CI");
return;
}

for(let cert of certificados){

document.getElementById(cert.estado).innerHTML="Buscando...";
document.getElementById(cert.link).style.display="none";

try{

let response=await fetch(cert.url);

let data=await response.text();

let filas=data.split(/\r?\n/);

let encontrado=false;

for(let i=1;i<filas.length;i++){

let columnas=filas[i].split(",");

let ciTabla=columnas[0].replace(/"/g,'').trim();
let link=columnas[1].replace(/"/g,'');

if(ci===ciTabla){

document.getElementById(cert.estado).innerHTML="<span class='ok'>✔ Certificado encontrado</span>";

let boton=document.getElementById(cert.link);

boton.href=link;

boton.style.display="inline-block";

encontrado=true;

break;

}

}

if(!encontrado){

document.getElementById(cert.estado).innerHTML="<span class='error'>No se encontró certificado</span>";

}

}catch{

document.getElementById(cert.estado).innerHTML="<span class='error'>Error consultando datos</span>";

}

}

}

</script>

</body>

</html>
