<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificación de Certificados</title>

<style>

*{
box-sizing:border-box;
}

body{

font-family:Arial, sans-serif;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("fondo.jpg");

background-size:cover;
background-position:center;

height:100vh;
display:flex;
align-items:center;
justify-content:center;

margin:0;

}

.container{

background:white;
padding:40px;

width:420px;
max-width:90%;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

text-align:center;

}

.logo{

width:110px;
margin-bottom:10px;

}

h2{

margin-top:5px;
color:#333;

}

.sub{

font-size:14px;
color:#777;

margin-bottom:20px;

}

input{

width:90%;
padding:12px;

border-radius:6px;
border:1px solid #ccc;

font-size:16px;

margin-top:10px;

}

button{

margin-top:15px;

padding:12px 25px;

border:none;

background:#2b7cff;

color:white;

font-size:16px;

border-radius:6px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#174db3;

}

#resultado{

margin-top:25px;

text-align:left;

}

.card{

border:1px solid #ddd;

padding:15px;

border-radius:8px;

margin-bottom:10px;

background:#f9f9f9;

}

.cert-title{

font-weight:bold;

color:#333;

margin-bottom:10px;

}

.descargar{

display:inline-block;

padding:8px 15px;

background:#28a745;

color:white;

text-decoration:none;

border-radius:5px;

font-size:14px;

}

.descargar:hover{

background:#1f8a37;

}

.error{

color:red;
text-align:center;

}

.ok{

color:#28a745;
font-weight:bold;
text-align:center;
margin-bottom:10px;

}

.loading{

text-align:center;
color:#555;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>Verificación de Certificados</h2>

<div class="sub">
Ingrese su número de CI
</div>

<input type="text" id="ci" placeholder="Ej: 7212809">

<br>

<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

const urls=[

"https://docs.google.com/spreadsheets/d/e/2PACX-1vQBwaV8MukiuNrmX2wh-JUBjmbimI1mgF7adnuMdWxajvQ2-jvvWYi9uKn_EyqZk3kFyYKam8yGq7V_/pub?gid=0&single=true&output=csv",

"https://docs.google.com/spreadsheets/d/e/2PACX-1vQhNPw-DqY-NEUmbfVz00JBcZnZIHifOaSFF-MQ_BDiT288bcGMXF6-gdj-5j0YPgzVceWil_Qhkk8z/pub?gid=832962079&single=true&output=csv",

"https://docs.google.com/spreadsheets/d/e/2PACX-1vSSJjexwsV7Qph7wLj_Y3gBEK4LU_Au7C8a_g2L4uV-GdoDDeff-iFYhG9gVzMhvLOJniaZBmGz7Cie/pub?gid=0&single=true&output=csv"

];

async function buscar(){

let ci=document.getElementById("ci").value.trim().replace(/\s/g,'');

if(ci===""){

document.getElementById("resultado").innerHTML=
"<div class='error'>Ingrese su CI</div>";

return;

}

document.getElementById("resultado").innerHTML=
"<div class='loading'>Buscando certificados...</div>";

let encontrados=[];

try{

for(let url of urls){

let response=await fetch(url);

let data=await response.text();

let filas=data.split(/\r?\n/);

for(let i=1;i<filas.length;i++){

let columnas=filas[i].split(",");

let ciTabla=columnas[0]?.replace(/"/g,'').trim();

let link=columnas[1]?.replace(/"/g,'');

if(ci===ciTabla){

encontrados.push(link);

}

}

}

if(encontrados.length>0){

let html="<div class='ok'>✔ Certificados encontrados</div>";

encontrados.forEach((link,i)=>{

html+=`

<div class="card">

<div class="cert-title">
Certificado ${i+1}
</div>

<a class="descargar" href="${link}" target="_blank">

Descargar Certificado

</a>

</div>

`;

});

document.getElementById("resultado").innerHTML=html;

}else{

document.getElementById("resultado").innerHTML=
"<div class='error'>No se encontraron certificados</div>";

}

}catch(error){

document.getElementById("resultado").innerHTML=
"<div class='error'>Error consultando la base de datos</div>";

}

}

</script>

</body>

</html>
